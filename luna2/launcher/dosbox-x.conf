# ============================================================
#  DOSBox-X 設定檔 — 俠客遊 II (Lunatic Dawn II, 1996)
#  可攜版：沒有任何硬編路徑
#  由吟遊詩人的傳說 · 俠客遊小站 於 2026 整理
#  https://tonilumvp.github.io/LunaticDawn/
#
#  使用方式：
#    1. 把這個檔案放在和 LUNA2.EXE 同一個資料夾
#    2. 雙擊啟動腳本（Mac: 啟動俠客遊II.command / Win: 啟動俠客遊II.bat）
#    3. 啟動腳本會自動把遊戲資料夾 mount 成 C:
#
#  手動模式（進階使用者）：
#    dosbox-x -conf dosbox-x.conf -c "mount c ." -c "c:" -c "LUNA2.EXE"
# ============================================================

[sdl]
fullscreen       = false
fulldouble       = false
fullresolution   = desktop
windowresolution = 960x720
output           = openglpp
autolock         = true
sensitivity      = 100
waitonerror      = true
priority         = higher,normal
usescancodes     = true

[dosbox]
title            = 俠客遊 II (Lunatic Dawn II)
memsize          = 16
machine          = svga_s3
captures         = capture
language         =

[video]
vmemsize         = 4

[render]
aspect           = true
scaler           = none

[cpu]
core             = auto
cputype          = pentium
# 1996 年的遊戲大約設計在 Pentium 100 左右
# 若太慢：Ctrl+F12 加速；太快：Ctrl+F11 減速
cycles           = fixed 20000
cycleup          = 500
cycledown        = 500

[mixer]
nosound          = false
rate             = 44100
blocksize        = 1024
prebuffer        = 25

[sblaster]
sbtype           = sb16
sbbase           = 220
irq              = 7
dma              = 1
hdma             = 5
mixer            = true
oplmode          = auto
oplrate          = 44100
oplemu           = default

[midi]
mpu401           = intelligent
mididevice       = default

[speaker]
pcspeaker        = true
tandy            = auto
disney           = false

[joystick]
joysticktype     = none

[dos]
xms              = true
ems              = true
umb              = true
ver              = 6.22
keyboardlayout   = us
# 950 = Big5 (繁體中文)；這遊戲自帶字型不依賴系統 code page
# 但先把 cp 設好避免 "No translation support" 警告
customcodepage   = 950,AUTO

[ipx]
ipx              = false

# ============================================================
#  [autoexec] 只負責顯示啟動橫幅
#  真正的 mount c . / c: / LUNA2.EXE 由啟動腳本用 -c 注入
#  （這樣此 conf 檔完全不用知道遊戲在哪個路徑）
# ============================================================
[autoexec]
@echo off
cls
echo ============================================================
echo    Lunatic Dawn II / 俠客遊 II   (1996 Artdink)
echo    吟遊詩人的傳說 · 俠客遊小站 啟動器
echo ------------------------------------------------------------
echo    Alt+Enter = 切換全螢幕
echo    Ctrl+F11 / Ctrl+F12 = 減速 / 加速 CPU
echo    Ctrl+F9 = 強制結束模擬器
echo ============================================================
echo.

<body>
<a class="skip-link" href="#main-content">跳到主要內容</a>
<div class="wrap">
  <header class="site-header">
    <div class="header-inner">
      <h1 class="pixel">魔法資料庫 · 80 筆</h1>
      <nav><a href="index.html">← 資料庫首頁</a> · <a href="../../index.html">回主站</a></nav>

<main id="main-content">

  <div class="toolbar">
    <label for="search">搜尋:</label>
    <input id="search" type="search" placeholder="例：照明、火、治療" autofocus>
    <span class="count" id="count">— / 80</span>
  </div>
  <div style="background: rgba(255, 176, 0, 0.06); border-left: 3px solid var(--amber); padding: 8px 12px; margin: 12px 0; font-size: 12px;">
    ⚖️ <strong>公開政策 v2.0</strong>：5 系魔法 80 records 含 48 招完整名稱 + 效果 + MP 消耗 = 玩家學到法術可見的「事實」，依日 / 台 / 美三邊著作權法不受保護。完整公開。
  </div>
  <div id="content"><div style="padding: 40px; text-align: center; color: var(--phosphor-dim);">載入中...</div></div>
</div>

<script>
window.LIST_CONFIG = {
  dataKey: 'magics',
  totalCount: 80,
  columns: ['ID', '魔法名稱', '系別', 'MP', 'ATK', '類型'],
  searchField: (m) => (m.name || '') + (m.system || '') + (m.type || ''),
  getRowFields: (m) => [
    { value: '0x' + m.id.toString(16).toUpperCase().padStart(2, '0'), class: 'num' },
    { value: m.is_empty_slot ? '—' : (m.name || '—'), class: m.is_empty_slot ? 'dim' : '' },
    { value: m.system || '—' },
    { value: m.is_empty_slot ? '—' : window.num(m.mp_cost), class: 'num mp' },
    { value: m.atk ?? '—', class: 'num atk' },
    { value: m.type || '—' },
  ],
  detailFn: (dtd, m) => {
    const grid = window.el('div', { class: 'grid' });
    const fields = [
      ['系別 (5 系分區)', m.system || '?'],
      ['MP 消耗', m.is_empty_slot ? '空 slot' : m.mp_cost],
      ['攻擊力 (ATK)', m.atk ?? '無 (治療/偵測)'],
      ['法術類型', m.type || '?'],
      ['動畫 ID', m.anim_id ?? '無 (輔助類)'],
      ['空 slot', m.is_empty_slot ? '是 (該 slot 未使用)' : '否'],
    ];
    for (const [label, value] of fields) {
      const div = window.el('div', null,
        window.el('b', null, label),
        window.el('span', null, String(value))
      );
      grid.appendChild(div);
    }
    dtd.appendChild(grid);

    dtd.appendChild(window.el('div', { class: 'raw' },
      window.el('b', { style: 'color: var(--phosphor-dim);' }, 'raw hex'),
      window.el('br'),
      m._raw
    ));
  },
};
</script>
<script src="list-page.js"></script>
</main>

<body>

<div class="wrap">
  <header class="site-header">
    <div class="header-inner">
      <h1 class="pixel">怪物資料庫 · 128 筆</h1>
      <nav><a href="index.html">← 資料庫首頁</a> · <a href="../../index.html">回主站</a></nav>

<main id="main-content">

  <div class="toolbar">
    <label for="search">搜尋:</label>
    <input id="search" type="search" placeholder="例：強盜、龍、魔術師" autofocus>
    <span class="count" id="count">，/ 128</span>
  </div>
  <div style="background: rgba(255, 176, 0, 0.06); border-left: 3px solid var(--amber); padding: 8px 12px; margin: 12px 0; font-size: 12px;">
    ⚖️ <strong>公開政策 v2.0</strong>：怪物完整數值（HP/ATK/弱點/必殺技）= 玩家戰鬥可見的「事實」，依三邊著作權法（🇹🇼 著作權法 §10-1 + 🇯🇵 著作権法 §2 + §12-2 + 🇺🇸 17 USC §102(b) + Feist v. Rural (1991)）不受版權保護。完整 128 筆全公開。
  </div>
  <div id="content"><div style="padding: 40px; text-align: center; color: var(--phosphor-dim);">載入中...</div></div>
</div>

<script>
window.LIST_CONFIG = {
  dataKey: 'monsters',
  totalCount: 128,
  columns: ['ID', '怪物名稱', 'HP', 'MP', 'STM', 'Lv', 'ATK', 'EXP', '金錢', '掉寶'],
  searchField: (m) => (m.name || '') + (m.name_inline || ''),
  getRowFields: (m) => [
    { value: '0x' + m.id.toString(16).toUpperCase().padStart(2, '0'), class: 'num' },
    { value: m.name || m.name_inline },
    { value: m.hp + ' / ' + m.hp_max, class: 'num hp' },
    { value: m.mp || '，', class: 'num mp' },
    { value: m.stm ?? '，', class: 'num' },
    { value: m.level, class: 'num lvl' },
    { value: m.atk, class: 'num atk' },
    { value: m.exp, class: 'num' },
    { value: m.money, class: 'num' },
    {
      value: (m.drop_1 !== null && m.drop_1 !== undefined ? '#' + m.drop_1 : '，')
           + (m.drop_2 !== null && m.drop_2 !== undefined ? ' ,#' + m.drop_2 : ''),
      class: 'num'
    },
  ],
  detailFn: async (dtd, m) => {
    // 載入 MONS_R 描述（每怪物 2 records）
    if (!window._monsR) {
      try {
        const r = await fetch('enc_decrypted.json');
        if (r.ok) {
          const enc = await r.json();
          window._monsR = enc['MONS_R.ENC'] || [];
        } else { window._monsR = []; }
      } catch (e) { window._monsR = []; }
    }
    const desc = window._monsR[m.id * 2];
    if (desc && desc.name && desc.name.trim()) {
      dtd.appendChild(window.el('div', { class: 'desc' }, '「' + desc.name + '」'));
    }

    // 詳細數值 grid
    const grid = window.el('div', { class: 'grid' });
    const fields = [
      ['HP（顯示）', m.hp],
      ['HP_max（戰鬥）', m.hp_max],
      ['MP', m.mp || '無'],
      ['STM（體力）', m.stm ?? '無'],
      ['等級', m.level],
      ['攻擊力', m.atk],
      ['防砍', m.def_slash],
      ['防刺', m.def_pierce],
      ['防敲', m.def_blunt],
      ['經驗值', m.exp],
      ['金錢', m.money],
      ['魔法種類', m.magic_count],
      ['掉寶 1 ID', m.drop_1 ?? '無'],
      ['掉寶 2 ID', m.drop_2 ?? '無'],
      ['sub-id', m.sub_id],
      ['inline 名', m.name_inline],
    ];
    for (const [label, value] of fields) {
      const div = window.el('div', null,
        window.el('b', null, label),
        window.el('span', null, String(value))
      );
      grid.appendChild(div);
    }
    dtd.appendChild(grid);

    dtd.appendChild(window.el('div', { class: 'raw' },
      window.el('b', { style: 'color: var(--phosphor-dim); font-family: \"Press Start 2P\", monospace; font-size: 10px;' }, 'raw hex'),
      window.el('br'),
      m._raw
    ));
  },
};
</script>
<script src="list-page.js"></script>
</main>

# Jekyll 設定（GitHub Pages 預設啟用 Jekyll 處理 repo root）
# 用 exclude 把「內部文件」從公開站排除——這些檔案仍在 git 內（給 git clone 的開發者看），
# 但訪客直接訪問 URL 會 404。

exclude:
  # 內部規範與架構文件（給 toni / Claude / 開發者看，訪客看不懂也不需要）
  - PUBLISHING.md
  - ARCHITECTURE.md
  - QUALITY_BAR.md

  # Build pipeline 工具（內部運作，不該對外暴露 source）
  - tools/
  - _build_guides.py
  - _build_oldsite.py
  - _build_readme.py
  - _local/
  - _pdf_pages_2026-04-30/
  - serve.py
  - .gitignore

# 站台基本資訊（GitHub Pages 自動偵測）
title: 吟遊詩人的傳說 · 俠客遊
description: 俠客遊 (Lunatic Dawn) 系列數位文化保存站
